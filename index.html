<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0d1117;
    color:white;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
}

h1{
    margin-top:20px;
}

.scoreboard{
    display:flex;
    gap:30px;
    margin:20px 0;
    font-size:1.2rem;
    font-weight:bold;
}

.status{
    margin-bottom:15px;
    font-size:1.2rem;
    min-height:30px;
}

.controls{
    margin-bottom:20px;
}

.action{
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    color:white;
    font-weight:bold;
    margin:5px;
}

.reset{
    background:#2196f3;
}

.reset-score{
    background:#f44336;
}

.board{
    position:relative;

    width:min(90vw,500px);

    display:grid;
    grid-template-columns:repeat(3,1fr);

    gap:10px;
}

.box{
    aspect-ratio:1/1;

    border:none;
    border-radius:15px;

    background:#d8c7ca;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:clamp(2rem,8vw,4rem);
    font-weight:bold;

    cursor:pointer;

    padding:0;
    line-height:1;

    transition:0.2s;
}

.box:hover{
    box-shadow:0 0 15px rgba(255,255,255,0.3);
}

.winner{
    background:aquamarine;
}

@media(max-width:600px){

    .scoreboard{
        flex-direction:column;
        gap:10px;
        text-align:center;
    }

    .action{
        width:150px;
    }

}

#winLine{
    position:absolute;

    height:8px;
    background:red;

    border-radius:10px;

    transform-origin:left center;

    z-index:100;

    pointer-events:none;
}

.animate-line{
    animation:drawLine .5s forwards;
}

@keyframes drawLine{

    from{
        transform:inherit scaleX(0);
    }

    to{
        transform:inherit scaleX(1);
    }

}

</style>
</head>

<body>

<h1>Tic Tac Toe</h1>

<div class="scoreboard">
    <div id="xScore"></div>
    <div id="oScore"></div>
</div>

<div class="status" id="status"></div>

<div class="controls">
    <button class="action reset" onclick="resetBoard()">
        Reset Board
    </button>

    <button class="action reset-score" onclick="resetScores()">
        Reset Scores
    </button>
</div>

<div class="board">

    <div id="winLine"></div>

    <button class="box"></button>
    <button class="box"></button>
    <button class="box"></button>

    <button class="box"></button>
    <button class="box"></button>
    <button class="box"></button>

    <button class="box"></button>
    <button class="box"></button>
    <button class="box"></button>

</div>

<script>

let player1 = prompt("Enter Player 1 Name") || "Player X";
let player2 = prompt("Enter Player 2 Name") || "Player O";

const boxes = document.querySelectorAll(".box");
const statusDiv = document.getElementById("status");

let turn = "X";
let gameOver = false;

let xScore =
Number(localStorage.getItem("tic_xScore")) || 0;

let oScore =
Number(localStorage.getItem("tic_oScore")) || 0;

const patterns = [

    [0,1,2],
    [3,4,5],
    [6,7,8],

    [0,3,6],
    [1,4,7],
    [2,5,8],

    [0,4,8],
    [2,4,6]

];

updateScoreboard();
updateTurn();

boxes.forEach(box=>{

    box.addEventListener("click",()=>{

        if(gameOver) return;

        if(box.innerText!=="") return;

        box.innerText=turn;

        if(checkWinner()){
            return;
        }

        if(checkDraw()){
            return;
        }

        turn = turn==="X" ? "O" : "X";

        updateTurn();

    });

});

function updateTurn(){

    if(turn==="X"){
        statusDiv.innerText =
        `${player1}'s Turn (X)`;
    }
    else{
        statusDiv.innerText =
        `${player2}'s Turn (O)`;
    }

}

function checkWinner(){

    for(let pattern of patterns){

        let a = boxes[pattern[0]].innerText;
        let b = boxes[pattern[1]].innerText;
        let c = boxes[pattern[2]].innerText;

        if(a!=="" && a===b && b===c){

            gameOver = true;

            pattern.forEach(index=>{
                boxes[index].classList.add("winner");
            });
            drawWinningLine(pattern);

            if(a==="X"){

                xScore++;

                localStorage.setItem(
                    "tic_xScore",
                    xScore
                );

                statusDiv.innerText =
                `${player1} Wins 🎉`;

            }
            else{

                oScore++;

                localStorage.setItem(
                    "tic_oScore",
                    oScore
                );

                statusDiv.innerText =
                `${player2} Wins 🎉`;

            }

            updateScoreboard();

            return true;
        }

    }

    return false;
}

function checkDraw(){

    let filled = true;

    boxes.forEach(box=>{

        if(box.innerText===""){
            filled = false;
        }

    });

    if(filled){

        gameOver = true;

        statusDiv.innerText =
        "It's a Draw 🤝";

        return true;
    }

    return false;
}

function updateScoreboard(){

    document.getElementById("xScore")
    .innerText =
    `${player1}: ${xScore}`;

    document.getElementById("oScore")
    .innerText =
    `${player2}: ${oScore}`;
}

function resetBoard(){

    boxes.forEach(box=>{

        box.innerText = "";

        box.classList.remove("winner");

    });

    turn = "X";

    gameOver = false;

    updateTurn();


    const line =
document.getElementById("winLine");

line.classList.remove("animate-line");

line.style.width = "0";
}

function resetScores(){

    xScore = 0;
    oScore = 0;

    localStorage.setItem("tic_xScore",0);
    localStorage.setItem("tic_oScore",0);

    updateScoreboard();
}

function drawWinningLine(pattern){

    const line = document.getElementById("winLine");

    const firstBox = boxes[pattern[0]];
    const lastBox = boxes[pattern[2]];

    const boardRect = document
        .querySelector(".board")
        .getBoundingClientRect();

    const firstRect = firstBox.getBoundingClientRect();
    const lastRect = lastBox.getBoundingClientRect();

    const x1 =
        firstRect.left +
        firstRect.width / 2 -
        boardRect.left;

    const y1 =
        firstRect.top +
        firstRect.height / 2 -
        boardRect.top;

    const x2 =
        lastRect.left +
        lastRect.width / 2 -
        boardRect.left;

    const y2 =
        lastRect.top +
        lastRect.height / 2 -
        boardRect.top;

    const length =
        Math.sqrt(
            (x2 - x1) ** 2 +
            (y2 - y1) ** 2
        );

    const angle =
        Math.atan2(
            y2 - y1,
            x2 - x1
        ) * 180 / Math.PI;

    line.style.width = `${length}px`;
    line.style.left = `${x1}px`;
    line.style.top = `${y1}px`;

    line.style.transform =
        `rotate(${angle}deg) scaleX(0)`;

    line.classList.remove("animate-line");

    void line.offsetWidth;

    line.classList.add("animate-line");
}

</script>

</body>
</html>
